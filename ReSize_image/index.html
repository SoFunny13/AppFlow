<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReSize — Image Resizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root {
    --bg: #0A0F0C;
    --bg-card: #131A15;
    --bg-card-hover: #1A2319;
    --border: #1E2B22;
    --border-accent: #6B8F5E;
    --green: #6B8F5E;
    --green-glow: rgba(107, 143, 94, 0.15);
    --green-bright: #8BB87A;
    --cream: #F2EDE3;
    --cream-dim: rgba(242, 237, 227, 0.5);
    --cream-muted: rgba(242, 237, 227, 0.3);
    --danger: #C45B5B;
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--cream);
    font-family: 'Outfit', sans-serif;
    font-weight: 400;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px;
    pointer-events: none;
    z-index: 9999;
  }

  /* Ambient glow */
  .ambient {
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 600px;
    background: radial-gradient(ellipse, var(--green-glow) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 48px 24px 80px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 48px;
  }

  header h1 {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 42px;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
  }

  header h1 span {
    color: var(--green-bright);
  }

  header p {
    font-size: 15px;
    color: var(--cream-dim);
    font-weight: 300;
  }

  /* Controls bar */
  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .control-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .control-group label {
    font-size: 13px;
    color: var(--cream-muted);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    white-space: nowrap;
  }

  select, input[type="number"] {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--cream);
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    outline: none;
    transition: border-color 0.2s;
  }

  select:focus, input[type="number"]:focus {
    border-color: var(--green);
  }

  select {
    cursor: pointer;
    padding-right: 32px;
    appearance: none;
    background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%236B8F5E' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 12px center;
  }

  input[type="number"] {
    width: 90px;
    text-align: center;
  }

  .custom-size {
    display: none;
    align-items: center;
    gap: 6px;
  }

  .custom-size.visible { display: flex; }

  .custom-size .x {
    color: var(--cream-muted);
    font-size: 13px;
  }

  /* Drop zone */
  .dropzone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 64px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    margin-bottom: 32px;
  }

  .dropzone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--green-glow), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .dropzone:hover,
  .dropzone.dragover {
    border-color: var(--green);
    background: rgba(107, 143, 94, 0.04);
  }

  .dropzone:hover::before,
  .dropzone.dragover::before {
    opacity: 1;
  }

  .dropzone-icon {
    width: 48px;
    height: 48px;
    margin: 0 auto 16px;
    opacity: 0.6;
  }

  .dropzone h3 {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 20px;
    margin-bottom: 6px;
    position: relative;
  }

  .dropzone p {
    font-size: 13px;
    color: var(--cream-muted);
    position: relative;
  }

  .dropzone input {
    display: none;
  }

  /* Image grid */
  .images-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .images-header h2 {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 18px;
  }

  .images-header .count {
    color: var(--cream-muted);
    font-size: 13px;
  }

  .actions {
    display: flex;
    gap: 10px;
  }

  .btn {
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 9px 18px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--cream);
    cursor: pointer;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .btn:hover {
    border-color: var(--green);
    background: var(--bg-card-hover);
  }

  .btn-primary {
    background: var(--green);
    border-color: var(--green);
    color: #0A0F0C;
    font-weight: 600;
  }

  .btn-primary:hover {
    background: var(--green-bright);
    border-color: var(--green-bright);
  }

  .btn-danger {
    border-color: transparent;
    color: var(--cream-muted);
  }

  .btn-danger:hover {
    border-color: var(--danger);
    color: var(--danger);
    background: rgba(196, 91, 91, 0.08);
  }

  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .image-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }

  .image-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: all 0.3s ease;
    animation: cardIn 0.4s ease backwards;
    position: relative;
  }

  .image-card:hover {
    border-color: var(--border-accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(12px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .image-card .thumb {
    width: 100%;
    aspect-ratio: 9/16;
    object-fit: cover;
    display: block;
    background: #0E1410;
  }

  .image-card .info {
    padding: 12px;
  }

  .image-card .name {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
  }

  .image-card .meta {
    font-size: 11px;
    color: var(--cream-muted);
  }

  .image-card .card-actions {
    display: flex;
    gap: 6px;
    margin-top: 8px;
  }

  .image-card .card-btn {
    flex: 1;
    font-family: 'Outfit', sans-serif;
    font-size: 11px;
    font-weight: 500;
    padding: 6px 0;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--cream-dim);
    cursor: pointer;
    transition: all 0.2s;
  }

  .image-card .card-btn:hover {
    border-color: var(--green);
    color: var(--cream);
  }

  .image-card .card-btn.remove:hover {
    border-color: var(--danger);
    color: var(--danger);
  }

  .image-card .status {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    backdrop-filter: blur(8px);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .image-card .status.done {
    background: rgba(107, 143, 94, 0.9);
    opacity: 1;
  }

  .image-card .status.processing {
    background: rgba(20, 30, 22, 0.85);
    border: 2px solid var(--green);
    opacity: 1;
    animation: pulse 1s infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }

  /* Progress bar */
  .progress-bar {
    width: 100%;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin: 20px 0;
    overflow: hidden;
    display: none;
  }

  .progress-bar.active { display: block; }

  .progress-bar .fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green), var(--green-bright));
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s ease;
  }

  /* Empty state */
  .empty-state {
    display: none;
  }

  /* Footer */
  footer {
    text-align: center;
    margin-top: 64px;
    font-size: 12px;
    color: var(--cream-muted);
    opacity: 0.6;
  }

  footer a {
    color: var(--green);
    text-decoration: none;
  }

  /* Responsive */
  @media (max-width: 600px) {
    header h1 { font-size: 32px; }
    .controls { flex-direction: column; align-items: stretch; }
    .image-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .container { padding: 32px 16px 64px; }
  }
</style>
</head>
<body>

<div class="ambient"></div>

<div class="container">

  <header>
    <h1>Re<span>Size</span></h1>
    <p>Drop images, pick a size, download. Everything happens in your browser.</p>
  </header>

  <!-- Controls -->
  <div class="controls">
    <div class="control-group">
      <label>Size</label>
      <select id="presetSelect">
        <option value="1290x2796">iPhone 6.7" — 1290 x 2796</option>
        <option value="1242x2688" selected>iPhone 6.5" — 1242 x 2688</option>
        <option value="1260x2736">iPhone 6.1" Pro — 1260 x 2736</option>
        <option value="1179x2556">iPhone 6.1" — 1179 x 2556</option>
        <option value="2048x2732">iPad Pro — 2048 x 2732</option>
        <option value="custom">Custom</option>
      </select>
    </div>
    <div class="control-group custom-size" id="customSize">
      <input type="number" id="customW" placeholder="W" min="1" value="1242">
      <span class="x">&times;</span>
      <input type="number" id="customH" placeholder="H" min="1" value="2688">
    </div>
  </div>

  <!-- Drop zone -->
  <div class="dropzone" id="dropzone">
    <svg class="dropzone-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="4" y="8" width="40" height="32" rx="4" stroke="#6B8F5E" stroke-width="2"/>
      <path d="M4 32l12-10 8 6 8-12 12 16" stroke="#6B8F5E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="16" cy="18" r="3" stroke="#6B8F5E" stroke-width="2"/>
    </svg>
    <h3>Drop images here</h3>
    <p>or click to browse &middot; PNG, JPG, WebP</p>
    <input type="file" id="fileInput" accept="image/*" multiple>
  </div>

  <!-- Images section -->
  <div id="imagesSection" style="display:none;">
    <div class="images-header">
      <h2>Images <span class="count" id="imageCount"></span></h2>
      <div class="actions">
        <button class="btn btn-danger" id="clearAll">Clear all</button>
        <button class="btn" id="resizeAll">Resize all</button>
        <button class="btn btn-primary" id="downloadAll" disabled>Download ZIP</button>
      </div>
    </div>
    <div class="progress-bar" id="progressBar"><div class="fill" id="progressFill"></div></div>
    <div class="image-grid" id="imageGrid"></div>
  </div>

  <footer>
    Built for <a href="#">Unpluq</a> &middot; No server. No uploads. 100% browser.
  </footer>

</div>

<script>
(function() {
  'use strict';

  // State
  const images = []; // { file, originalUrl, resizedBlob, resizedUrl, name, origW, origH }

  // DOM
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const presetSelect = document.getElementById('presetSelect');
  const customSize = document.getElementById('customSize');
  const customW = document.getElementById('customW');
  const customH = document.getElementById('customH');
  const imagesSection = document.getElementById('imagesSection');
  const imageGrid = document.getElementById('imageGrid');
  const imageCount = document.getElementById('imageCount');
  const resizeAllBtn = document.getElementById('resizeAll');
  const downloadAllBtn = document.getElementById('downloadAll');
  const clearAllBtn = document.getElementById('clearAll');
  const progressBar = document.getElementById('progressBar');
  const progressFill = document.getElementById('progressFill');

  // Get target dimensions
  function getTargetSize() {
    const val = presetSelect.value;
    if (val === 'custom') {
      return { w: parseInt(customW.value) || 1242, h: parseInt(customH.value) || 2688 };
    }
    const [w, h] = val.split('x').map(Number);
    return { w, h };
  }

  // Toggle custom size inputs
  presetSelect.addEventListener('change', () => {
    customSize.classList.toggle('visible', presetSelect.value === 'custom');
  });

  // Drag & Drop
  ['dragenter', 'dragover'].forEach(ev => {
    dropzone.addEventListener(ev, e => { e.preventDefault(); dropzone.classList.add('dragover'); });
  });
  ['dragleave', 'drop'].forEach(ev => {
    dropzone.addEventListener(ev, e => { e.preventDefault(); dropzone.classList.remove('dragover'); });
  });
  dropzone.addEventListener('drop', e => handleFiles(e.dataTransfer.files));
  dropzone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', () => { handleFiles(fileInput.files); fileInput.value = ''; });

  function handleFiles(fileList) {
    const files = [...fileList].filter(f => f.type.startsWith('image/'));
    if (!files.length) return;

    files.forEach((file, idx) => {
      const url = URL.createObjectURL(file);
      const img = new Image();
      img.onload = () => {
        images.push({
          file,
          originalUrl: url,
          resizedBlob: null,
          resizedUrl: null,
          name: file.name.replace(/\.[^.]+$/, ''),
          origW: img.naturalWidth,
          origH: img.naturalHeight
        });
        renderGrid();
      };
      img.src = url;
    });
  }

  function renderGrid() {
    imagesSection.style.display = images.length ? '' : 'none';
    imageCount.textContent = `(${images.length})`;
    downloadAllBtn.disabled = !images.some(i => i.resizedBlob);

    imageGrid.innerHTML = '';
    images.forEach((item, idx) => {
      const card = document.createElement('div');
      card.className = 'image-card';
      card.style.animationDelay = `${idx * 0.05}s`;

      const statusClass = item.resizedBlob ? 'done' : '';
      const statusIcon = item.resizedBlob ? '&#10003;' : '';

      card.innerHTML = `
        <div class="status ${statusClass}">${statusIcon}</div>
        <img class="thumb" src="${item.resizedUrl || item.originalUrl}" alt="${item.name}" loading="lazy">
        <div class="info">
          <div class="name">${item.name}</div>
          <div class="meta">${item.origW} &times; ${item.origH}${item.resizedBlob ? ' &rarr; resized' : ''}</div>
          <div class="card-actions">
            ${item.resizedBlob
              ? `<button class="card-btn" onclick="app.download(${idx})">Download</button>`
              : `<button class="card-btn" onclick="app.resizeOne(${idx})">Resize</button>`
            }
            <button class="card-btn remove" onclick="app.remove(${idx})">Remove</button>
          </div>
        </div>
      `;
      imageGrid.appendChild(card);
    });
  }

  // Resize using canvas (scale to fill + center crop)
  function resizeImage(item) {
    return new Promise(resolve => {
      const { w: targetW, h: targetH } = getTargetSize();
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = targetW;
        canvas.height = targetH;
        const ctx = canvas.getContext('2d');

        // Enable high quality
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';

        // Scale to fill (cover)
        const scale = Math.max(targetW / img.naturalWidth, targetH / img.naturalHeight);
        const scaledW = img.naturalWidth * scale;
        const scaledH = img.naturalHeight * scale;
        const offsetX = (targetW - scaledW) / 2;
        const offsetY = (targetH - scaledH) / 2;

        ctx.drawImage(img, offsetX, offsetY, scaledW, scaledH);

        canvas.toBlob(blob => {
          item.resizedBlob = blob;
          if (item.resizedUrl) URL.revokeObjectURL(item.resizedUrl);
          item.resizedUrl = URL.createObjectURL(blob);
          resolve();
        }, 'image/png');
      };
      img.src = item.originalUrl;
    });
  }

  async function resizeAll() {
    const total = images.length;
    if (!total) return;

    resizeAllBtn.disabled = true;
    progressBar.classList.add('active');
    progressFill.style.width = '0%';

    for (let i = 0; i < total; i++) {
      // Mark processing
      const cards = imageGrid.querySelectorAll('.image-card');
      if (cards[i]) {
        const st = cards[i].querySelector('.status');
        st.className = 'status processing';
        st.innerHTML = '';
      }

      await resizeImage(images[i]);
      progressFill.style.width = `${((i + 1) / total) * 100}%`;
    }

    resizeAllBtn.disabled = false;
    setTimeout(() => { progressBar.classList.remove('active'); }, 500);
    renderGrid();
  }

  async function resizeOne(idx) {
    await resizeImage(images[idx]);
    renderGrid();
  }

  function downloadOne(idx) {
    const item = images[idx];
    if (!item.resizedBlob) return;
    const { w, h } = getTargetSize();
    const a = document.createElement('a');
    a.href = item.resizedUrl;
    a.download = `${item.name}_${w}x${h}.png`;
    a.click();
  }

  async function downloadZip() {
    const resized = images.filter(i => i.resizedBlob);
    if (!resized.length) return;

    downloadAllBtn.disabled = true;
    downloadAllBtn.textContent = 'Packing...';

    const { w, h } = getTargetSize();
    const zip = new JSZip();
    resized.forEach((item, i) => {
      zip.file(`${item.name}_${w}x${h}.png`, item.resizedBlob);
    });

    const blob = await zip.generateAsync({ type: 'blob' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `resized_${w}x${h}.zip`;
    a.click();
    URL.revokeObjectURL(a.href);

    downloadAllBtn.disabled = false;
    downloadAllBtn.textContent = 'Download ZIP';
  }

  function clearAll() {
    images.forEach(i => {
      URL.revokeObjectURL(i.originalUrl);
      if (i.resizedUrl) URL.revokeObjectURL(i.resizedUrl);
    });
    images.length = 0;
    renderGrid();
  }

  function remove(idx) {
    const item = images[idx];
    URL.revokeObjectURL(item.originalUrl);
    if (item.resizedUrl) URL.revokeObjectURL(item.resizedUrl);
    images.splice(idx, 1);
    renderGrid();
  }

  // Button handlers
  resizeAllBtn.addEventListener('click', resizeAll);
  downloadAllBtn.addEventListener('click', downloadZip);
  clearAllBtn.addEventListener('click', clearAll);

  // Expose for inline onclick
  window.app = { download: downloadOne, resizeOne, remove };

})();
</script>

</body>
</html>
